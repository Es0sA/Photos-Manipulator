services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    restart: unless-stopped
    env_file: .env
    environment:
      TELEGRAM_LOCAL: "true"
      TELEGRAM_WORK_DIR: /var/lib/telegram-bot-api
      TELEGRAM_TEMP_DIR: /var/lib/telegram-bot-api/temp
    volumes:
      - bot-api-data:/var/lib/telegram-bot-api

  bot:
    build: .
    env_file: .env
    restart: unless-stopped
    depends_on:
      - telegram-bot-api
    environment:
      LOCAL_API_BASE_URL: http://telegram-bot-api:8081
      PHOTOS_JOBS_DIR: /var/lib/telegram-bot-api/_photos_jobs
    volumes:
      - bot-api-data:/var/lib/telegram-bot-api

volumes:
  bot-api-data:
